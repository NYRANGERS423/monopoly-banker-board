services:
  monopoly-banker:
    # Auto-built and pushed by .github/workflows/docker-publish.yml.
    # Tag channels:
    #   :latest    — stable releases from `main` branch (recommended for production)
    #   :beta      — pre-release builds from `beta` branch (test new features here)
    #   :1.2.3     — pinned semver from `v1.2.3` git tags (most reproducible)
    # To build from source instead, comment `image:` and uncomment `build: .`.
    image: ghcr.io/nyrangers423/monopoly-banker-board:latest
    # build: .
    container_name: monopoly-banker
    restart: unless-stopped
    ports:
      - "3030:3030"   # host:container — change the host (left) side if 3030 is in use
    volumes:
      # left side = host path (change to wherever you want the SQLite file).
      # right side = container path — don't change, the app writes banker.db here.
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - ADMIN_CODE=1413                       # CHANGE THIS before exposing outside your LAN
      - DEFAULT_CURRENCY=classic              # classic | millions
      - DEFAULT_FREE_PARKING_ENABLED=true
      - DEFAULT_STARTING_BALANCE=1500         # 15000000 in millions mode
      - DEFAULT_PASS_GO_AMOUNT=200            # 2000000 in millions mode
      - DB_PATH=/app/data/banker.db
